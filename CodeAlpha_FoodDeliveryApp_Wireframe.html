<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery App — Low-Fidelity Wireframes</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    margin: 0;
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .screen-wrap {
    background: #f2f2f2;
    border-radius: 12px;
    padding: 16px;
  }
  .screen-label {
    font-size: 13px;
    color: #666666;
    margin: 0 0 8px;
    text-align: center;
  }
  .screen {
    background: #ffffff;
    border: 1px solid #d0d0d0;
    border-radius: 12px;
    padding: 10px;
    min-height: 440px;
    display: flex;
    flex-direction: column;
  }
  .bar { border-radius: 3px; background: #b3b3b3; }
  .bar.dark { background: #808080; }
  .card { border: 1px solid #c2c2c2; border-radius: 8px; }
  button.wire {
    width: 100%;
    height: 36px;
    background: #1a1a1a;
    color: #ffffff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .plus-btn {
    width: 22px; height: 22px;
    border: 1px solid #1a1a1a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>Food Delivery App — Low-Fidelity Wireframes</h1>

<div class="grid">

  <!-- HOME -->
  <div class="screen-wrap">
    <p class="screen-label">Home</p>
    <div class="screen">
      <div class="bar dark" style="height:14px; width:60%; margin-bottom:12px;"></div>
      <div style="height:34px; border:1px solid #1a1a1a; border-radius:6px; display:flex; align-items:center; padding:0 10px; margin-bottom:14px;">
        <div style="width:14px; height:14px; border:1.5px solid #666; border-radius:50%; margin-right:8px;"></div>
        <div class="bar" style="height:8px; width:70%;"></div>
      </div>
      <div class="bar" style="height:10px; width:40%; margin-bottom:10px;"></div>
      <div style="display:flex; gap:8px; margin-bottom:16px;">
        <div style="width:60px; height:24px; border:1px solid #c2c2c2; border-radius:14px;"></div>
        <div style="width:60px; height:24px; border:1px solid #c2c2c2; border-radius:14px;"></div>
        <div style="width:60px; height:24px; border:1px solid #c2c2c2; border-radius:14px;"></div>
      </div>
      <div class="bar" style="height:10px; width:50%; margin-bottom:10px;"></div>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="card" style="padding:8px; display:flex; gap:10px; align-items:center;">
          <div style="width:44px; height:44px; background:#b3b3b3; border-radius:6px; flex-shrink:0;"></div>
          <div style="flex:1;">
            <div class="bar dark" style="height:8px; width:70%; margin-bottom:6px;"></div>
            <div class="bar" style="height:6px; width:40%;"></div>
          </div>
        </div>
        <div class="card" style="padding:8px; display:flex; gap:10px; align-items:center;">
          <div style="width:44px; height:44px; background:#b3b3b3; border-radius:6px; flex-shrink:0;"></div>
          <div style="flex:1;">
            <div class="bar dark" style="height:8px; width:60%; margin-bottom:6px;"></div>
            <div class="bar" style="height:6px; width:35%;"></div>
          </div>
        </div>
        <div class="card" style="padding:8px; display:flex; gap:10px; align-items:center;">
          <div style="width:44px; height:44px; background:#b3b3b3; border-radius:6px; flex-shrink:0;"></div>
          <div style="flex:1;">
            <div class="bar dark" style="height:8px; width:65%; margin-bottom:6px;"></div>
            <div class="bar" style="height:6px; width:45%;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESTAURANT / MENU -->
  <div class="screen-wrap">
    <p class="screen-label">Restaurant / menu</p>
    <div class="screen">
      <div style="height:80px; background:#b3b3b3; border-radius:8px; margin-bottom:10px;"></div>
      <div class="bar dark" style="height:12px; width:55%; margin-bottom:6px;"></div>
      <div class="bar" style="height:8px; width:35%; margin-bottom:14px;"></div>
      <div class="bar" style="height:10px; width:30%; margin-bottom:10px;"></div>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div style="border-bottom:1px solid #e0e0e0; padding-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div class="bar dark" style="height:8px; width:90px; margin-bottom:6px;"></div>
            <div class="bar" style="height:6px; width:60px;"></div>
          </div>
          <div class="plus-btn">+</div>
        </div>
        <div style="border-bottom:1px solid #e0e0e0; padding-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div class="bar dark" style="height:8px; width:100px; margin-bottom:6px;"></div>
            <div class="bar" style="height:6px; width:50px;"></div>
          </div>
          <div class="plus-btn">+</div>
        </div>
        <div style="border-bottom:1px solid #e0e0e0; padding-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div class="bar dark" style="height:8px; width:80px; margin-bottom:6px;"></div>
            <div class="bar" style="height:6px; width:55px;"></div>
          </div>
          <div class="plus-btn">+</div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div class="bar dark" style="height:8px; width:95px; margin-bottom:6px;"></div>
            <div class="bar" style="height:6px; width:45px;"></div>
          </div>
          <div class="plus-btn">+</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CART -->
  <div class="screen-wrap">
    <p class="screen-label">Cart</p>
    <div class="screen">
      <div class="bar dark" style="height:14px; width:40%; margin-bottom:16px;"></div>
      <div style="display:flex; flex-direction:column; gap:12px; flex:1;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e0e0e0; padding-bottom:10px;">
          <div style="display:flex; gap:8px; align-items:center;">
            <div style="width:36px; height:36px; background:#b3b3b3; border-radius:6px;"></div>
            <div>
              <div class="bar dark" style="height:8px; width:80px; margin-bottom:6px;"></div>
              <div class="bar" style="height:6px; width:40px;"></div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:6px;">
            <div style="width:18px; height:18px; border:1px solid #c2c2c2; border-radius:4px;"></div>
            <div class="bar" style="height:8px; width:10px;"></div>
            <div style="width:18px; height:18px; border:1px solid #c2c2c2; border-radius:4px;"></div>
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e0e0e0; padding-bottom:10px;">
          <div style="display:flex; gap:8px; align-items:center;">
            <div style="width:36px; height:36px; background:#b3b3b3; border-radius:6px;"></div>
            <div>
              <div class="bar dark" style="height:8px; width:70px; margin-bottom:6px;"></div>
              <div class="bar" style="height:6px; width:40px;"></div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:6px;">
            <div style="width:18px; height:18px; border:1px solid #c2c2c2; border-radius:4px;"></div>
            <div class="bar" style="height:8px; width:10px;"></div>
            <div style="width:18px; height:18px; border:1px solid #c2c2c2; border-radius:4px;"></div>
          </div>
        </div>
      </div>
      <div style="border-top:1px solid #e0e0e0; padding-top:10px; margin-top:10px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <div class="bar" style="height:8px; width:60px;"></div>
          <div class="bar" style="height:8px; width:40px;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
          <div class="bar dark" style="height:10px; width:50px;"></div>
          <div class="bar dark" style="height:10px; width:45px;"></div>
        </div>
        <button class="wire">Checkout</button>
      </div>
    </div>
  </div>

  <!-- CHECKOUT / CONFIRMATION -->
  <div class="screen-wrap">
    <p class="screen-label">Checkout / confirmation</p>
    <div class="screen">
      <div class="bar dark" style="height:14px; width:50%; margin-bottom:14px;"></div>
      <div class="bar" style="height:10px; width:35%; margin-bottom:8px;"></div>
      <div style="border:1px solid #c2c2c2; border-radius:8px; height:44px; margin-bottom:14px;"></div>
      <div class="bar" style="height:10px; width:35%; margin-bottom:8px;"></div>
      <div style="border:1px solid #c2c2c2; border-radius:8px; height:44px; margin-bottom:14px;"></div>
      <div style="border-top:1px solid #e0e0e0; padding-top:10px; margin-bottom:14px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <div class="bar" style="height:8px; width:70px;"></div>
          <div class="bar" style="height:8px; width:40px;"></div>
        </div>
        <div style="display:flex; justify-content:space-between;">
          <div class="bar dark" style="height:10px; width:50px;"></div>
          <div class="bar dark" style="height:10px; width:45px;"></div>
        </div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px dashed #c2c2c2; border-radius:8px; margin-bottom:14px;">
        <div style="width:40px; height:40px; border:2px solid #666; border-radius:50%; margin-bottom:8px;"></div>
        <div class="bar" style="height:8px; width:80px;"></div>
      </div>
      <button class="wire">Place order</button>
    </div>
  </div>

</div>

</body>
</html>
